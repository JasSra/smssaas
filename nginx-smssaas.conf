# Add this server block to /etc/nginx/sites-enabled/ on the gateway (192.168.4.25)
# Follows the same pattern as mailsaas-api (:8100) and mailsaas-mcp (:8200)

server {
    listen 443 ssl;
    server_name sms.YOUR_DOMAIN.com;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.com/privkey.pem;

    # REST API
    location / {
        proxy_pass         http://127.0.0.1:8300;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # WebSocket voice streams  (ws://... or wss://...)
    location /ws/ {
        proxy_pass         http://127.0.0.1:8300;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;  # keep voice WebSockets open for up to 1 hour
    }

    # Stripe webhook — no buffering, pass raw body
    location /billing/webhook {
        proxy_pass              http://127.0.0.1:8300;
        proxy_set_header        Host $host;
        proxy_request_buffering off;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name sms.YOUR_DOMAIN.com;
    return 301 https://$host$request_uri;
}
